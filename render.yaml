services:
  # API / Backend
  - type: web
    name: safeeely-api-iyb3
    env: node
    plan: free
    rootDir: .
    buildCommand: npm install && npm run build -w packages/shared && npm run build -w packages/api && npx puppeteer browsers install chrome
    startCommand: npm start -w packages/api
    healthCheckPath: /api/ping
    envVars:
      - fromGroup: safeeely-common-iyb3

  # Telegram Bot
  - type: web
    name: safeeely-telegram-iyb3
    env: node
    plan: free
    rootDir: .
    buildCommand: npm install && npm run build -w packages/shared && npm run build -w packages/telegram
    startCommand: npm start -w packages/telegram
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - fromGroup: safeeely-common-iyb3

  # Discord Bot
  - type: web
    name: safeeely-discord-iyb3
    env: node
    plan: free
    rootDir: .
    buildCommand: npm install && npm run build -w packages/shared && npm run build -w packages/discord
    startCommand: npm start -w packages/discord
    envVars:
      - key: DISCORD_BOT_TOKEN
        sync: false
  # Apple Business / JivoChat Bot
  - type: web
    name: safeeely-apple-iyb3
    env: node
    plan: free
    rootDir: .
    buildCommand: npm install && npm run build -w packages/shared && npm run build -w packages/apple_business
    startCommand: npm start -w packages/apple_business
    healthCheckPath: /health
    envVars:
      - key: JIVO_PROVIDER_ID
        sync: false
      - key: JIVO_TOKEN
        sync: false
      - fromGroup: safeeely-common-iyb3

envVarGroups:
  - name: safeeely-common
    envVars:
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: API_URL
        sync: false # Set this to https://your-api-url.onrender.com/api
      - key: REVIEWS_URL
        sync: false # Set this to your Vercel URL
      - key: JWT_SECRET
        value: safepadi_admin_super_secret # Change this for production security
