services:
  # API / Backend
  - type: web
    name: safeeely-api
    env: node
    plan: free
    rootDir: packages/api
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        fromGroup: safeeely-common
      - key: REVIEWS_URL
        value: https://yourdomain.com # Set this to your Vercel URL

  # Telegram Bot
  - type: web
    name: safeeely-telegram
    env: node
    plan: free
    rootDir: packages/telegram
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - fromGroup: safeeely-common

  # Discord Bot
  - type: web
    name: safeeely-discord
    env: node
    plan: free
    rootDir: packages/discord
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DISCORD_BOT_TOKEN
        sync: false
      - fromGroup: safeeely-common

envVarGroups:
  - name: safeeely-common
    envVars:
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
