services:
  # API / Backend
  - type: web
    name: safeeely-api
    env: node
    plan: free
    rootDir: .
    buildCommand: npm install && npm run build -w packages/api
    startCommand: node packages/api/dist/server.js
    envVars:
      - fromGroup: safeeely-common-iyb3

  # Telegram Bot
  - type: web
    name: safeeely-telegram
    env: node
    plan: free
    rootDir: .
    buildCommand: npm install && npm run build -w packages/telegram
    startCommand: node packages/telegram/dist/bot.js
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - fromGroup: safeeely-common-iyb3

  # Discord Bot
  - type: web
    name: safeeely-discord
    env: node
    plan: free
    rootDir: .
    buildCommand: npm install && npm run build -w packages/discord
    startCommand: node packages/discord/dist/bot.js
    envVars:
      - key: DISCORD_BOT_TOKEN
        sync: false
      - fromGroup: safeeely-common-iyb3

envVarGroups:
  - name: safeeely-common
    envVars:
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: API_URL
        sync: false # Set this to https://your-api-url.onrender.com/api
      - key: REVIEWS_URL
        sync: false # Set this to your Vercel URL
      - key: JWT_SECRET
        value: safepadi_admin_super_secret # Change this for production security
